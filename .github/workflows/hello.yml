name: Use secrets

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Use the secret
        run: echo "The secret is ${{ secrets.MY_API_KEY }}"

      - name: Deploy with secret
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "Deploying with API key: $API_KEY"
          echo "Note: GitHub masks secrets in logs as ***"
